version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: cm_grievance_db
    restart: unless-stopped
    ports: ["27017:27017"]
    volumes: ["mongo_data:/data/db"]
    networks: [cm_network]

  backend:
    build: ./backend
    container_name: cm_grievance_backend
    restart: unless-stopped
    ports: ["5000:5000"]
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/cm_grievance
      JWT_SECRET: change_this_in_production_to_a_long_random_string
      JWT_EXPIRE: 7d
      CLIENT_URL: http://localhost:3000
    depends_on: [mongodb]
    volumes: ["./backend/uploads:/app/uploads"]
    networks: [cm_network]

  frontend:
    build: ./frontend
    container_name: cm_grievance_frontend
    restart: unless-stopped
    ports: ["3000:80"]
    depends_on: [backend]
    networks: [cm_network]

volumes:
  mongo_data:

networks:
  cm_network:
    driver: bridge
